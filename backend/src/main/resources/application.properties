# Server Configuration
server.port=8080
server.servlet.context-path=/api

# Database Configuration
# 注意：在Linux环境部署时，请根据实际情况修改数据库地址、用户名和密码
spring.datasource.url=jdbc:mysql://localhost:3306/xiaohongshu?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA Configuration - 使用 validate 而非 update 避免外键兼容性问题
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# File Upload Configuration
spring.servlet.multipart.max-file-size=200MB
spring.servlet.multipart.max-request-size=200MB

# File Storage Location - 使用绝对路径确保文件存储位置一致
# 在Linux环境中，确保该目录存在且应用有读写权限
# 可以使用绝对路径，如 /opt/xiaohongshu/uploads
file.upload-dir=D:/1/Essencity/uploads
